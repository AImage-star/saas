name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wasp binary
        run: |
          curl -Lkf https://github.com/wasp-lang/wasp/releases/download/v0.23.0/wasp-linux-x86_64.tar.gz -o wasp.tar.gz
          tar -xzf wasp.tar.gz
          sudo mv wasp /usr/local/bin/
          wasp version

      - name: Generate Wasp project
        run: wasp lang build

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/downloads/linux/latest | tar xz
          sudo mv railway /usr/local/bin/

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway login --token="$RAILWAY_TOKEN"
          railway up --no-input
          railway url
