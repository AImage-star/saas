name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: template/app/package-lock.json

      - name: Install Wasp
        run: npm install -g wasp-lang/waspc

      - name: Install dependencies
        run: |
          cd template/app && npm ci

      - name: Build SaaS app
        run: |
          cd template/app && npm run build

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Install Railway CLI
          curl -fsSL https://railway.app/downloads/linux/latest | tar xz
          sudo mv railway /usr/local/bin/
          
          # Login to Railway
          railway login --token="$RAILWAY_TOKEN"
          
          # Link to project (create if not exists)
          railway init --no-input
          
          # Deploy
          railway up --no-input

      - name: Get Railway URL
        run: |
          railway url 2>&1 || echo "Deployment complete - check Railway dashboard"