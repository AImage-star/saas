name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Wasp
        run: npm install -g @wasp.sh/wasp-cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -x
          wasp version || echo "WASP_VERSION_FAILED"
          wasp deploy railway 2>&1 | tee deploy.log
          echo "Deploy exit: $?"
          cat deploy.log || true

      - name: Show Railway URL
        run: |
          railway url 2>&1 || echo "No URL (deployment may have failed)"
