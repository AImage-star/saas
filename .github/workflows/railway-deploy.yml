name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wasp binary
        run: |
          set -x
          echo "Downloading wasp..."
          ls -la
          curl -fL --connect-timeout 30 --max-time 300 -o wasp.tar.gz             https://github.com/wasp-lang/wasp/releases/download/v0.23.0/wasp-linux-x86_64.tar.gz             2>&1 | tee curl_output.txt
          echo "curl exit: $?"
          echo "File size:"
          ls -lh wasp.tar.gz 2>&1 || echo "File not found"
          echo "File type:"
          file wasp.tar.gz 2>&1 || echo "file command not found"
          echo "Tarball contents:"
          tar -tzf wasp.tar.gz 2>&1 | head -10 || echo "tar failed"
          echo "Extracting..."
          tar -xzf wasp.tar.gz 2>&1
          echo "tar exit: $?"
          echo "Files after extraction:"
          ls -la
          ls -la wasp 2>/dev/null && file wasp || echo "wasp not found"
          chmod +x wasp
          sudo mv wasp /usr/local/bin/
          wasp version 2>&1 || echo "wasp version failed"

      - name: Generate Wasp project
        run: wasp lang build

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/downloads/linux/latest | tar xz
          sudo mv railway /usr/local/bin/

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway login --token="$RAILWAY_TOKEN"
          railway up --no-input
          railway url
