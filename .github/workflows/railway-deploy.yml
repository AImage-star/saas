name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wasp
        run: |
          npm install -g @wasp.sh/wasp-cli
          wasp version

      - name: Debug wasp environment
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Wasp version: $(wasp version)"
          echo "---"
          echo "Checking main.wasp:"
          head -5 main.wasp 2>/dev/null || echo "main.wasp not found"
          echo "---"
          echo "Checking .wasproot:"
          cat .wasproot 2>/dev/null || echo ".wasproot not found"
          echo "---"
          echo "Files at root:"
          ls -la

      - name: Generate Wasp project
        run: |
          set -x
          wasp lang build 2>&1 | tee wasp_build.log
          echo "wasp lang build exit: $?"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/downloads/linux/latest | tar xz
          sudo mv railway /usr/local/bin/

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway login --token="$RAILWAY_TOKEN"
          railway up --no-input
          railway url
