name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test connectivity
        run: |
          echo "=== Testing connectivity ==="
          curl -I https://github.com 2>&1 | head -3
          echo "---"
          curl -I https://objects.githubusercontent.com 2>&1 | head -3
          echo "---"
          curl -I https://github.com/wasp-lang/wasp/releases/download/v0.23.0/wasp-linux-x86_64.tar.gz 2>&1 | head -5

      - name: Download Wasp binary
        run: |
          echo "=== Downloading wasp ==="
          mkdir -p /tmp/wasp-test
          curl -fL --connect-timeout 30 --max-time 300             -o /tmp/wasp-test/wasp.tar.gz             https://github.com/wasp-lang/wasp/releases/download/v0.23.0/wasp-linux-x86_64.tar.gz
          echo "Downloaded, size: $(ls -lh /tmp/wasp-test/wasp.tar.gz | awk '{print $5}')"
          echo "Content type: $(file /tmp/wasp-test/wasp.tar.gz)"
          tar -tzf /tmp/wasp-test/wasp.tar.gz | head -5
          tar -xzf /tmp/wasp-test/wasp.tar.gz -C /tmp/wasp-test/
          ls -la /tmp/wasp-test/
          chmod +x /tmp/wasp-test/wasp
          sudo mv /tmp/wasp-test/wasp /usr/local/bin/
          wasp version

      - name: Generate Wasp project
        run: wasp lang build

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/downloads/linux/latest | tar xz
          sudo mv railway /usr/local/bin/

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway login --token="$RAILWAY_TOKEN"
          railway up --no-input
          railway url
