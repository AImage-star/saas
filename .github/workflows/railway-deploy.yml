name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wasp
        run: npm install -g @wasp.sh/wasp-cli

      - name: Generate Wasp project
        run: wasp lang build

      - name: Install dependencies
        run: npm install

      - name: Build
        run: wasp deploy

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/downloads/linux/latest | tar xz
          sudo mv railway /usr/local/bin/

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway login --token="$RAILWAY_TOKEN"
          railway up --no-input
          railway url
