name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Wasp
        run: npm install -g @wasp.sh/wasp-cli

      - name: Generate Wasp project
        run: wasp lang build

      - name: Install dependencies
        run: npm install

      - name: Build
        run: wasp deploy railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          NODE_VERSION: '24'

      - name: Get Railway URL
        run: railway url 2>&1 || echo "Deployment complete"
