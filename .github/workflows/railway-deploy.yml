name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wasp
        run: npm install -g @wasp.sh/wasp-cli

      - name: Check directory structure
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== All files ==="
          find . -maxdepth 3 -type f -name '*.json' | grep -v node_modules | head -20
          echo "=== template/app exists? ==="
          ls -la template/app/ 2>/dev/null || echo "NOT FOUND"
          echo "=== template/app/package.json first lines ==="
          head -5 template/app/package.json 2>/dev/null || echo "FILE NOT FOUND"

      - name: Install dependencies
        run: cd template/app && npm install

      - name: Build SaaS app
        run: cd template/app && npm run build

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          curl -fsSL https://railway.app/downloads/linux/latest | tar xz
          sudo mv railway /usr/local/bin/
          railway login --token="$RAILWAY_TOKEN"
          railway init --no-input
          railway up --no-input

      - name: Get Railway URL
        run: |
          railway url 2>&1 || echo "Deployment complete - check Railway dashboard"