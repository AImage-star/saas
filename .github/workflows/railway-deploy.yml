name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Wasp
        run: |
          npm install -g @wasp.sh/wasp-cli
          wasp version || echo "WASP_VERSION_FAILED"
          node --version
          npm --version

      - name: Generate Wasp project
        run: wasp lang build 2>&1 | tee wasp_build.log || cat wasp_build.log

      - name: Install dependencies
        run: npm install

      - name: Build
        run: wasp deploy railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Get Railway URL
        run: railway url 2>&1 || echo "Done"
