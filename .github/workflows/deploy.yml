name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wasp CLI
        run: npm i -g @wasp.sh/wasp-cli

      - name: Install dependencies
        run: npm install

      - name: Run database migrations
        run: wasp db migrate-dev
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Start server
        run: wasp start
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PORT: 3001
          NODE_ENV: production